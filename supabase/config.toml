project_id = "zendesk-live-dashboard"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 5000

[db]
port = 54322
shadow_port = 54320
major_version = 17

[studio]
enabled = true
port = 54323

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["http://127.0.0.1:3000"]
jwt_expiry = 3600
enable_signup = true

[realtime]
enabled = true

[functions.sync-live]
verify_jwt = false

[functions.sync-history]
verify_jwt = false

[functions.sync-recordings]
verify_jwt = false

[functions.stream-recording]
verify_jwt = false

[functions.aircall-webhook]
verify_jwt = false

[functions.sync-aircall-users]
verify_jwt = false
